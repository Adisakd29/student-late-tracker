<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — ระบบนักศึกษามาสาย</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Prompt:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D2B55;--navy2:#1A4080;--navy3:#2A5FA8;
  --gold:#C99B3A;--gold2:#E8C06A;--gold-pale:#FDF6E3;
  --bg:#F4F6FA;--white:#fff;
  --border:#D8E0EE;--text:#1A2840;--muted:#5A6A82;--light:#8A9AB8;
  --danger:#C0392B;--danger-bg:#FDF2F0;
  --success:#1E7E4A;--success-bg:#EDF7F2;
  --radius:10px;--radius-sm:6px;
  --shadow:0 2px 12px rgba(13,43,85,0.08);
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;}

/* Header */
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(13,43,85,0.25);}
.hdr-inner{max-width:1200px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px;}
.hdr-icon{width:42px;height:42px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr-title h1{font-family:'Prompt',sans-serif;font-size:16px;font-weight:600;color:#fff;}
.hdr-title p{font-size:12px;color:rgba(255,255,255,0.55);margin-top:1px;}
.hdr-clock{margin-left:auto;text-align:right;font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5;}
.hdr-clock strong{display:block;color:var(--gold2);font-size:13px;}

/* Layout */
.page{max-width:1200px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start;}
@media(max-width:860px){.page{grid-template-columns:1fr;}}

/* Card */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.card-hdr{background:var(--navy);padding:13px 18px;display:flex;align-items:center;gap:9px;}
.card-hdr h2{font-family:'Prompt',sans-serif;font-size:14px;font-weight:500;color:#fff;}
.card-hdr .ico{font-size:16px;color:var(--gold2);}
.card-body{padding:18px;}

/* QR */
.qr-box{text-align:center;padding:8px 0 16px;}
.qr-box img{width:200px;height:200px;border-radius:8px;border:1px solid var(--border);}
.qr-url{margin-top:10px;font-size:12px;color:var(--muted);word-break:break-all;
  background:var(--bg);padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);}
.qr-url a{color:var(--navy3);text-decoration:none;font-weight:500;}
.qr-url a:hover{text-decoration:underline;}

.btn{padding:9px 16px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;
  border-radius:var(--radius-sm);border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all 0.13s;}
.btn:active{transform:scale(0.97);}
.btn-block{width:100%;justify-content:center;margin-top:10px;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy2);}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:600;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:#e8edf7;color:var(--text);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f0c0bc;}
.btn-danger:hover{background:#fbe8e6;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;text-align:center;box-shadow:var(--shadow);}
.stat .n{font-family:'Prompt',sans-serif;font-size:26px;font-weight:600;color:var(--navy);line-height:1;}
.stat .l{font-size:12px;color:var(--muted);margin-top:4px;}
.stat.gold .n{color:var(--gold);}
.stat.red .n{color:var(--danger);}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.toolbar h3{font-family:'Prompt',sans-serif;font-size:14px;font-weight:500;color:var(--text);margin-right:auto;}

/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
thead th{background:var(--navy);color:rgba(255,255,255,0.85);font-weight:500;font-size:11px;
  padding:9px 12px;text-align:left;white-space:nowrap;letter-spacing:0.03em;}
tbody tr:nth-child(even){background:#F8FAFD;}
tbody tr:hover{background:#EEF3FC;}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.dept-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap;}
.d-mech{background:#EDF7F2;color:#1E7E4A;}
.d-elec{background:#FEF9ED;color:#B8860B;}
.d-civil{background:#FDF2F0;color:#C0392B;}
.d-auto{background:#E8EFF9;color:#1A4080;}
.d-other{background:#F3F0FA;color:#5B3DB8;}
.lvl{font-size:12px;font-weight:600;color:var(--navy2);}
.rmk{font-size:11px;color:var(--muted);max-width:160px;}
.del-btn{background:none;border:none;color:var(--light);cursor:pointer;padding:3px 7px;border-radius:5px;font-size:13px;}
.del-btn:hover{background:var(--danger-bg);color:var(--danger);}

.empty{padding:48px 20px;text-align:center;color:var(--light);}
.empty .big{font-size:36px;display:block;margin-bottom:8px;}
.empty p{font-size:14px;}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;
  padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;
  box-shadow:0 4px 20px rgba(13,43,85,0.25);
  opacity:0;transform:translateY(8px);transition:all 0.22s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--success);}
.toast.err{background:var(--danger);}

/* Print QR button */
.print-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="hdr-icon">🏫</div>
    <div class="hdr-title">
      <h1>ระบบบันทึกนักศึกษามาสาย</h1>
      <p>Admin Panel</p>
    </div>
    <div class="hdr-clock">
      <strong id="hdr-date"></strong>
      <span id="hdr-time"></span>
    </div>
  </div>
</header>

<div class="page">

  <!-- LEFT -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <div class="card">
      <div class="card-hdr"><span class="ico">📱</span><h2>QR Code สำหรับนักศึกษา</h2></div>
      <div class="card-body">
        <div class="qr-box">
          <div id="qr-loading" style="width:200px;height:200px;margin:0 auto;background:#f4f6fa;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;">กำลังโหลด...</div>
          <img id="qr-img" src="" alt="QR Code" style="display:none;"/>
          <div class="qr-url" id="qr-url-box" style="display:none">
            ลิงก์: <a id="qr-link" href="#" target="_blank"></a>
          </div>
        </div>
        <button class="btn btn-navy btn-block" onclick="window.print()">🖨️ พิมพ์ QR Code</button>
        <p class="print-hint">นักศึกษาสแกน QR แล้วกรอกข้อมูลบนมือถือ</p>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr"><span class="ico">⚙️</span><h2>การจัดการ</h2></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-gold btn-block" onclick="exportExcel()">📊 ส่งออก Excel</button>
        <button class="btn btn-ghost btn-block" onclick="loadData()">🔄 รีเฟรชข้อมูล</button>
        <button class="btn btn-danger btn-block" onclick="clearAll()">🗑️ ล้างข้อมูลทั้งหมด</button>
      </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div>
    <div class="stats">
      <div class="stat"><div class="n" id="st-total">0</div><div class="l">ทั้งหมด</div></div>
      <div class="stat gold"><div class="n" id="st-today">0</div><div class="l">วันนี้</div></div>
      <div class="stat red"><div class="n" id="st-remark">0</div><div class="l">ผิดระเบียบ</div></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h3>📋 รายชื่อนักศึกษามาสาย</h3>
        <span id="rec-count" style="font-size:12px;color:var(--muted)">0 รายการ</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>เวลา</th>
              <th>ชื่อ-นามสกุล</th>
              <th>แผนก</th>
              <th>ชั้น</th>
              <th>หมายเหตุ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-body"></tbody>
        </table>
        <div class="empty" id="empty-state">
          <span class="big">📭</span>
          <p>ยังไม่มีรายการ<br>รอนักศึกษาสแกน QR และกรอกข้อมูล</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function pad(n){ return String(n).padStart(2,'0'); }
function updateClock(){
  const now = new Date();
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const now2 = new Date();
  document.getElementById('hdr-date').textContent = `วัน${days[now2.getDay()]}ที่ ${now2.getDate()} ${months[now2.getMonth()]} ${now2.getFullYear()+543}`;
  document.getElementById('hdr-time').textContent = `${pad(now2.getHours())}:${pad(now2.getMinutes())}:${pad(now2.getSeconds())}`;
}
updateClock(); setInterval(updateClock, 1000);

function toast(msg, type=''){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (type?' '+type:'');
  setTimeout(() => el.className='toast', 2800);
}

function deptClass(d){
  if(d.includes('กลโรงงาน')||d.includes('เชื่อม')) return 'd-mech';
  if(d.includes('ไฟฟ้า')||d.includes('อิเล็ก')) return 'd-elec';
  if(d.includes('ก่อสร้าง')) return 'd-civil';
  if(d.includes('ยนต์')) return 'd-auto';
  return 'd-other';
}

async function loadQR(){
  try {
    const res = await fetch('/api/qr');
    const data = await res.json();
    if(data.ok){
      document.getElementById('qr-loading').style.display='none';
      const img = document.getElementById('qr-img');
      img.src = data.qr; img.style.display='block';
      const box = document.getElementById('qr-url-box');
      box.style.display='block';
      const link = document.getElementById('qr-link');
      link.textContent = data.url; link.href = data.url;
    }
  } catch(e){}
}

let allRecords = [];
async function loadData(){
  try {
    const res = await fetch('/api/records');
    allRecords = await res.json();
    renderTable();
    updateStats();
  } catch(e){ toast('❌ โหลดข้อมูลไม่ได้','err'); }
}

function updateStats(){
  const today = new Date().toLocaleDateString('en-US');
  document.getElementById('st-total').textContent = allRecords.length;
  document.getElementById('st-today').textContent = allRecords.filter(r => {
    const d = new Date(r.created_at);
    return d.toLocaleDateString('en-US') === today;
  }).length;
  document.getElementById('st-remark').textContent = allRecords.filter(r=>r.remark).length;
  document.getElementById('rec-count').textContent = `${allRecords.length} รายการ`;
}

function renderTable(){
  const tbody = document.getElementById('tbl-body');
  const empty = document.getElementById('empty-state');
  if(!allRecords.length){ tbody.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  tbody.innerHTML = allRecords.map((r,i) => `
    <tr>
      <td style="color:var(--muted);font-size:12px">${i+1}</td>
      <td style="white-space:nowrap;font-size:12px;color:var(--muted)">${r.timestamp}</td>
      <td>
        <span style="font-size:11px;color:var(--muted)">${r.prefix}</span>
        <strong style="display:block;font-size:13px">${r.fname} ${r.lname}</strong>
      </td>
      <td><span class="dept-badge ${deptClass(r.dept)}">${r.dept}</span></td>
      <td><span class="lvl">${r.level}</span></td>
      <td class="rmk">${r.remark||'<span style="color:var(--light)">-</span>'}</td>
      <td><button class="del-btn" onclick="deleteRecord(${r.id})">✕</button></td>
    </tr>
  `).join('');
}

async function deleteRecord(id){
  if(!confirm('ลบรายการนี้?')) return;
  await fetch(`/api/records/${id}`, {method:'DELETE'});
  toast('🗑️ ลบแล้ว');
  loadData();
}

async function clearAll(){
  if(!allRecords.length) return;
  if(!confirm(`ล้างข้อมูลทั้งหมด ${allRecords.length} รายการ?`)) return;
  await fetch('/api/records', {method:'DELETE'});
  toast('🗑️ ล้างข้อมูลทั้งหมดแล้ว');
  loadData();
}

function exportExcel(){
  window.location.href = '/api/export';
  toast('📊 กำลังดาวน์โหลด...','ok');
}

// Auto-refresh every 10 seconds
loadQR();
loadData();
setInterval(loadData, 10000);
</script>
</body>
</html>
